id: hunt3r-api-key-exposure

info:
  name: API Key / Secret Exposure in Common Paths
  author: hunt3r
  severity: critical
  description: Detects leaked credentials and API keys in common config/debug endpoints.
  tags: exposure,secret-exposure,hunt3r,info-disclosure
  reference:
    - https://owasp.org/www-community/vulnerabilities/Information_exposure

http:
  - method: GET
    path:
      - "{{BaseURL}}/.env"
      - "{{BaseURL}}/.env.local"
      - "{{BaseURL}}/.env.production"
      - "{{BaseURL}}/config.json"
      - "{{BaseURL}}/config.js"
      - "{{BaseURL}}/api/config"
      - "{{BaseURL}}/app/config"
      - "{{BaseURL}}/settings.json"
      - "{{BaseURL}}/secrets.json"
      - "{{BaseURL}}/application.yml"
      - "{{BaseURL}}/application.properties"

    stop-at-first-match: false

    matchers-condition: and
    matchers:
      - type: status
        status: [200]

      - type: regex
        regex:
          - "AKIA[0-9A-Z]{16}"
          - "sk_live_[0-9a-zA-Z]{24,}"
          - "AIzaSy[0-9A-Za-z_-]{31}"
          - "github_pat_[A-Za-z0-9]{22,}"
          - "ghp_[A-Za-z0-9]{36}"
          - "xoxb-[0-9]{11}-[0-9A-Za-z]{24}"
          - "-----BEGIN (RSA |EC |DSA |OPENSSH )?PRIVATE KEY-----"
          - "(?i)(?:password|passwd|db_pass|secret_key|api_key|access_token|auth_token)\\s*[=:]\\s*['\"][^'\"]{8,}['\"]"

    extractors:
      - type: regex
        regex:
          - "(?i)(api.?key|secret|token|password)[\\s]*[=:][\\s]*[A-Za-z0-9+/=_\\-]{8,60}"
